name: Build FlyEnv macOS Packages
on:
  push:
    paths:
      - 'build/macos.build.yml'

jobs:
  build-macos:
    name: Build (${{ matrix.arch }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x64
            os: macos-15
            target: x64
          - arch: arm64
            os: macos-latest
            target: arm64
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Setup Go
        uses: actions/setup-go@v4
        with:
          go-version: 'stable'

      - name: Cache node_modules and node-gyp
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            **/node_modules
            .yarn/cache
            ~/.cache/node-gyp
          key: ${{ runner.os }}-${{ matrix.arch }}-node-${{ hashFiles('**/package.json') }}

      - name: Install Yarn and build tools
        run: |
          npm install -g yarn node-gyp

      - name: Install dependencies
        run: yarn install

      - name: Build Go helper
        run: |
          cd "$GITHUB_WORKSPACE/src/helper-go"
          chmod +x ./build.sh
          bash ./build.sh

      - name: Build Electron App (Unsigned)
        env:
          NODE_OPTIONS: "--max-old-space-size=4096"
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false
        run: yarn build

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: FlyEnv-macOS-${{ matrix.arch }}
          path: |
            release/*.dmg
            release/*.zip
            release/*.yml
            release/*.blockmap
