name: Build FlyEnv macOS Packages
on:
  push:
    paths:
      - 'build/macos.build.yml'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-macos:
    name: Build (${{ matrix.arch }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x64
            os: macos-15
          - arch: arm64
            os: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Setup Go
        uses: actions/setup-go@v4
        with:
          go-version: 'stable'

      - name: Cache node_modules and node-gyp
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            **/node_modules
            .yarn/cache
            ~/.cache/node-gyp
          key: ${{ runner.os }}-${{ matrix.arch }}-node-${{ hashFiles('**/package.json') }}

      - name: Install Yarn and build tools
        run: |
          npm install -g yarn node-gyp

      - name: Install dependencies
        run: yarn install

      - name: Build Go helper
        run: |
          cd "$GITHUB_WORKSPACE/src/helper-go"
          chmod +x ./build.sh
          bash ./build.sh

      - name: Build Electron App (Unsigned)
        env:
          NODE_OPTIONS: "--max-old-space-size=4096"
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false
        run: yarn build 2>&1 | tee build.log

      - name: List release directory
        run: |
          echo "Current directory:"
          pwd
          echo "Listing all files:"
          ls -la
          echo "Checking release directory:"
          if [ -d "release" ]; then
            ls -la release/
          else
            echo "Release directory not found!"
            echo "Checking dist directory:"
            if [ -d "dist" ]; then
              ls -la dist/
            fi
            echo "Build log (last 100 lines):"
            if [ -f "build.log" ]; then
              tail -100 build.log
            fi
          fi

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: FlyEnv-macOS-${{ matrix.arch }}
          path: release/
          if-no-files-found: warn
